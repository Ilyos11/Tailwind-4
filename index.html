  <ul class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-300">

<!-- Section 2 -->
<section class="relative bg-[#1a1f36] min-h-screen flex items-center overflow-hidden px-6 py-12 md:px-20">
